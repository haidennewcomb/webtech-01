<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Processor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .image-set {
      margin: 10px 0;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .image-set label, .image-set select, .image-set input {
      display: block;
      margin: 5px 0;
    }
    button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    .preview {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #ccc;
      min-height: 200px;
      position: relative;
    }
    .code {
      margin-top: 20px;
      background-color: #f4f4f4;
      padding: 10px;
      border: 1px solid #ccc;
      white-space: pre-wrap;
    }
  </style>
</head>

        <option value="css-demo/assets/css/css-demo/index.html">css-demo/assets/css/css-demo/index.html</option>
        <option value="css-demo/assets/css/css-demo/Instructions.html">css-demo/assets/css/css-demo/Instructions.html</option>
        <option value="css-demo/assets/css/css-demo/login.html">css-demo/assets/css/css-demo/login.html</option>
      </select>
      <input type="file" id="imageInput1" accept="image/*">
    </div>

    <button id="processBtn">Process Images</button>

    <div class="preview" id="preview">
      <p>Preview will appear here after processing.</p>
    </div>

    <div class="code" id="code" style="display: none;">
      <h3>CSS Code to Add to index.html</h3>
      <p>Add this to your &lt;style&gt; tag or CSS file:</p>
      <code id="cssCode"></code>
    </div>
  </div>

  <script>
    function applyBackground(imageUrl) {
      document.body.style.backgroundImage = `url(${imageUrl})`;
      document.body.style.backgroundSize = 'cover';
      document.body.style.backgroundAttachment = 'fixed';
      document.body.style.backgroundPosition = 'center';
      document.body.style.backgroundRepeat = 'no-repeat';
    }

    document.addEventListener('DOMContentLoaded', function() {
      const path = window.location.pathname.slice(1);
      const key = 'backgroundImage_' + path;
      const savedImage = localStorage.getItem(key);
      if (savedImage) {
        applyBackground(savedImage);
      }
    });

    document.getElementById('processBtn').addEventListener('click', function() {
      const sets = [
        { select: 'htmlSelect1', input: 'imageInput1' },
        { select: 'htmlSelect2', input: 'imageInput2' },
        { select: 'htmlSelect3', input: 'imageInput3' }
      ];

      sets.forEach(set => {
        const fileInput = document.getElementById(set.input);
        const file = fileInput.files[0];
        if (file) {
          const selectedFile = document.getElementById(set.select).value;
          const reader = new FileReader();
          reader.onload = function(e) {
            const imageUrl = e.target.result;
            applyBackground(imageUrl);
            const key = 'backgroundImage_' + selectedFile;
            localStorage.setItem(key, imageUrl);
          };
          reader.readAsDataURL(file);
        }
      });
    });
  </script>
</body>
</html>
