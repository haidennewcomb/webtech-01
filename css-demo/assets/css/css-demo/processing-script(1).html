<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" id="content">
    <h1>Do you want to proceed with processing your information?</h1>
    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>
  </div>

  <script>
    // Get URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const name = urlParams.get('name');
    const email = urlParams.get('email');
    const age = urlParams.get('age');

    document.getElementById('yesBtn').addEventListener('click', function() {
      // Process the information
      if (name === 'John' && email === 'john@example.com' && age == 25) {
        document.getElementById('content').innerHTML = `
          <h1>Information is correct!</h1>
          <p>You have entered the correct information.</p>
        `;
      } else {
        document.getElementById('content').innerHTML = `
          <h1>Information is incorrect</h1>
          <p>You will be redirected to the login page in 3 seconds.</p>
          <p><a href="login.html">Click here if not redirected</a></p>
        `;
        setTimeout(function() {
          window.location.href = 'login.html';
        }, 3000);
      }
    });

    document.getElementById('noBtn').addEventListener('click', function() {
      window.location.href = 'Instructions.html';
    });
  </script>
</body>
</html>
