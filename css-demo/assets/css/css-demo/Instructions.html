<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instructions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Fill Out Instructions</h1>
    <form id="instructionsForm" action="processing-script.php" method="post">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required><br><br>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required><br><br>

      <label for="age">Age:</label>
      <input type="number" id="age" name="age" required><br><br>

      <button type="submit">Submit</button>
    </form>
  </div>

  <script>
    document.getElementById('instructionsForm').addEventListener('submit', function(event) {
      event.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const age = document.getElementById('age').value;

      // Simple validation: if name is not 'John' or email not 'john@example.com' or age not 25
      if (name !== 'John' || email !== 'john@example.com' || age != 25) {
        alert('Information is incorrect');
        window.location.href = 'login.html';
      } else {
        alert('Information is correct!');
        // Perhaps redirect to another page or stay
      }
    });
  </script>
</body>
</html>
