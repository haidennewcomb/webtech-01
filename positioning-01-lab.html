<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Positioning Lab</title>
  <style type="text/css">
    /* ---------------Box Sizing----------------- */
    html {
      box-sizing: border-box;
    }
    *,
    *:before,
    *:after {
      box-sizing: inherit;
    }
    body {
      background-color: #ECECEC;
      font-weight: bold;
      font-family: Tahoma, Geneva, sans-serif;
      color: #FFF;
      text-align: center;
      line-height: 24px;
    }
    #wrapper {
        background-color: #FFF;
        border: 1px solid #c0c0c0;
        width: 800px;
        margin: 20px auto;
        padding: 10px;
        text-shadow: 2px 2px #000;
    }
    #navy {
        background-color: #001f3f;
        width: 180px;        
        height: 150px;
        float: left;         
        margin: 5px;
    }
    #teal{
    background-color: #0074D9;
    width: 180px;
    height: 150px;
    float:left;
    margin: 5px;
    }

    #blue {
        background-color: #0074D9;
        width: 180px;        
        height: 150px;
        float: left;         
        margin: 5px;
    }
        #aqua {
        background-color: #7FDBFF;
        width: 180px;        
        height: 150px;
        float: left;         
        margin: 5px;  
    }
    #footer {
    background-color: #666;
    clear: both;
    margin: 10px;
    padding: 10px;
    } 
  </style>
</head>
<body>
  <h1>Exercise</h1>
  <section id="wrapper">
    <div id="navy">Navy</div>
    <div id="teal">Teal</div>
    <div id="blue">Blue</div>
    <div id="aqua">Aqua</div>
    <div id="footer">Footer</div>
  </section>
</body>

</html>
